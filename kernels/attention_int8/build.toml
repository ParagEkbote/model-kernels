[build]
# Package name (must be valid Python identifier)
name = "attention_int8"

# Semantic versioning: MAJOR.MINOR.PATCH
version = "0.1.0"

# Human-readable description
description = "INT8 fused attention CUDA kernel for diffusion transformers with timestep awareness"

# Author information
authors = ["Your Name <your.email@example.com>"]

# Repository URL (for Hub)
repository = "https://huggingface.co/AINovice2005/attention-int8-kernel"

# License (SPDX identifier)
license = "Apache 2.0"

# Keywords for discoverability
keywords = ["attention", "cuda", "int8", "diffusion", "transformers", "kernel", "optimization"]

# Categories
categories = ["kernel", "attention", "diffusion"]

# Whether to include binary wheels
[build.wheels]
enabled = true

# PyTorch requirements
[torch]
# Minimum PyTorch version
minimum = "2.0.0"

# Optional: Maximum version (if you have compatibility issues with newer versions)
# maximum = "2.5.0"

# CUDA versions to support
# Format: List of CUDA version strings
cuda-versions = ["11.8", "12.0", "12.1", "12.2"]

# Architectures to build for
architectures = ["sm_80", "sm_89", "sm_90"]

# Dependencies
[dependencies]
# Runtime dependencies
torch = ">=2.0.0"

# Optional dependencies
[dependencies.optional]
# For development
pytest = { version = ">=7.0", optional = true }
pytest-cov = { version = ">=3.0", optional = true }

# Build system configuration
[build.system]
# Build backend
backend = "torch"

# Number of parallel build jobs
parallel-jobs = 4

# Whether to use Ninja build system
use-ninja = true

# Compiler optimization level (0-3)
optimization-level = 3

# Whether to build with line info (for debugging)
line-info = true

# GPU-specific settings
[gpu]
# CUDA compute capabilities to target
compute-capabilities = ["80", "89", "90"]

# Use fast math
fast-math = true

# Enable half-precision
enable-half = true

# Enable half2 precision
enable-half2 = true

# Platform-specific settings
[platform.cuda]
# CUDA-specific compiler flags
extra-flags = [
    "--use_fast_math",
    "-U__CUDA_NO_HALF_OPERATORS__",
    "-U__CUDA_NO_HALF_CONVERSIONS__",
    "-U__CUDA_NO_HALF2_OPERATORS__",
    "-lineinfo",
]

[platform.cpp]
# C++ compiler flags
extra-flags = [
    "-O3",
    "-std=c++17",
    "-fPIC",
    "-Wall",
    "-Wextra",
]

# Testing configuration
[test]
# Test framework
framework = "pytest"

# Test command
command = "pytest tests/ -v"

# Benchmarking configuration
[benchmark]
# Whether to include benchmarks
enabled = true

# Benchmark script
script = "benchmarks/benchmark_attention.py"

# Documentation
[docs]
# README path
readme = "README.md"

# License path
license = "LICENSE"

# Include examples
examples = ["examples/"]

# Publish settings
[publish]
# Whether to publish to Hub by default
enabled = true

# Hub organization (optional)
# organization = "kernels-community"

# Whether to require approval before publishing
require-approval = false

# Metadata for Hub
[hub]
# Tags for discoverability
tags = ["kernels", "cuda", "attention", "int8", "diffusion", "performance"]

# Whether to appear in kernel search
searchable = true

# Privacy level: public, private, or internal
privacy = "public"
